<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivi Financier Quotidien</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      color: #34495e;
    }
    input, select, button {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #2980b9;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #3498db;
      color: white;
    }
    tr:nth-child(even) {
      background: #f9f9f9;
    }
    .solde {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: right;
      color: #27ae60;
    }
    .actions {
      margin-top: 20px;
      text-align: right;
    }
    .actions button {
      margin-left: 10px;
    }
    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .delete-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Suivi de mes Dépenses (MAD)</h1>
    
    <form id="financeForm">
      <div>
        <label>Date :</label>
        <input type="date" id="date">
      </div>
      <div>
        <label>Type :</label>
        <select id="type">
          <option value="Entrée">Entrée (revenu)</option>
          <option value="Sortie">Sortie (dépense)</option>
        </select>
      </div>
      <div>
        <label>Description :</label>
        <input type="text" id="description" placeholder="Ex: Nourriture, Transport...">
      </div>
      <div>
        <label>Montant (MAD) :</label>
        <input type="number" id="montant" step="0.01">
      </div>
      <button type="button" onclick="ajouter()">Ajouter</button>
    </form>
    
    <table id="financeTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Description</th>
          <th>Montant (MAD)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    
    <div class="solde" id="solde">Solde actuel : 0 MAD</div>
    
    <div class="actions">
      <button onclick="exportCSV()">Exporter en CSV</button>
    </div>
  </div>
  
  <script>
    let solde = 0;
    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    function afficherTransactions() {
      const table = document.getElementById("financeTable").getElementsByTagName("tbody")[0];
      table.innerHTML = "";
      solde = 0;

      transactions.forEach((t, index) => {
        const newRow = table.insertRow();
        newRow.insertCell(0).innerText = t.date;
        newRow.insertCell(1).innerText = t.type;
        newRow.insertCell(2).innerText = t.description;
        newRow.insertCell(3).innerText = t.montant.toFixed(2) + " MAD";

        // Bouton supprimer
        const deleteCell = newRow.insertCell(4);
        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Supprimer";
        deleteBtn.className = "delete-btn";
        deleteBtn.onclick = () => supprimer(index);
        deleteCell.appendChild(deleteBtn);

        if(t.type === "Entrée") {
          solde += t.montant;
        } else {
          solde -= t.montant;
        }
      });

      document.getElementById("solde").innerText = "Solde actuel : " + solde.toFixed(2) + " MAD";
    }

    function ajouter() {
      const date = document.getElementById("date").value;
      const type = document.getElementById("type").value;
      const description = document.getElementById("description").value;
      const montant = parseFloat(document.getElementById("montant").value);
      
      if(date && type && description && montant) {
        transactions.push({date, type, description, montant});
        localStorage.setItem("transactions", JSON.stringify(transactions));
        afficherTransactions();
        document.getElementById("financeForm").reset();
      } else {
        alert("Veuillez remplir tous les champs !");
      }
    }

    function supprimer(index) {
      transactions.splice(index, 1);
      localStorage.setItem("transactions", JSON.stringify(transactions));
      afficherTransactions();
    }

    function exportCSV() {
      let csvContent = "data:text/csv;charset=utf-8,Date,Type,Description,Montant(MAD)\n";
      transactions.forEach(t => {
        csvContent += `${t.date},${t.type},${t.description},${t.montant}\n`;
      });
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "suivi_financier.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    window.onload = afficherTransactions;
  </script>
</body>
</html>
